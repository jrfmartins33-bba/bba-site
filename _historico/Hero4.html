<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>BBA - Consultoria Estratégica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <style>
    /* Reset & Typography */
     :root {
      --font-primary: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --bba-blue: #003A70; /* Sophisticated BBA Logo Blue */
      --bba-gold: #D4AF37; /* Sophisticated BBA Logo Gold */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-primary);
      background-color: #000;
      color: #ffffff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* 1. CONTENT POSITIONING -> PUSHED FURTHER DOWN */
    .bba-hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: flex-end; 
      justify-content: flex-start; 
      overflow: hidden;
      /* Reduced bottom padding to push text and CTA closer to the bottom edge */
      padding: 0 6% 32px 6%; 
    }

    /* Background Video */
    .bba-hero__video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* 2. OVERLAY IMPROVEMENT */
    .bba-hero__overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at bottom left, rgba(0,0,0,0.85) 0%, transparent 65%),
                  linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.4) 100%);
      z-index: 1;
    }

    /* 3. CONTENT CONTAINER */
    .bba-hero__content {
      position: relative;
      z-index: 2;
      max-width: 600px; 
      text-align: left; 
      display: flex;
      flex-direction: column;
      align-items: flex-start; 
      gap: 20px; 
      opacity: 0;
    }

    /* 4. HEADLINE SIZE */
    .bba-hero__headline {
      font-size: clamp(28px, 3.2vw, 42px); 
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.015em;
      margin: 0;
      color: rgba(255, 255, 255, 0.95);
    }

    /* 5. CTA POSITION */
    .bba-hero__cta-group {
      display: flex;
      flex-direction: column;
      align-items: flex-start; 
      gap: 12px;
      margin-top: 8px; 
    }

    /* 6. BBA BUTTON WITH BLUE BACKGROUND & GOLD HOVER EFFECT */
    .bba-hero__button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bba-blue); 
      color: #ffffff;
      padding: 14px 32px;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid transparent; 
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 20px rgba(0, 58, 112, 0.4);
    }

    .bba-hero__button svg {
      width: 18px;
      height: 18px;
      margin-left: 8px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: all 0.4s ease;
    }

    .bba-hero__button:hover {
      background-color: #002850; 
      border: 1px solid var(--bba-gold); 
      box-shadow: 0 8px 30px rgba(212, 175, 55, 0.25), 0 0 15px rgba(212, 175, 55, 0.15) inset;
      color: var(--bba-gold);
      transform: translateY(-2px);
    }

    .bba-hero__button:hover svg {
      stroke: var(--bba-gold);
      transform: translateX(4px); 
    }

    .bba-hero__button::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(
        90deg, 
        transparent, 
        rgba(212, 175, 55, 0.25), 
        transparent
      );
      transition: none;
    }

    .bba-hero__button:hover::before {
      animation: goldShine 0.8s ease-in-out forwards;
    }

    @keyframes goldShine {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    .bba-hero__microcopy {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 400;
      letter-spacing: 0.01em;
      padding-left: 8px;
    }

    /* Animation on load */
    .slide-up-fade {
      animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes slideUpFade {
      0% {
        opacity: 0;
        transform: translateY(30px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Mobile handling */
    @media (max-width: 768px) {
      .bba-hero {
        /* Pushed down further for mobile too */
        padding: 0 24px 24px 24px;
      }
      .bba-hero__headline {
        font-size: clamp(24px, 6.5vw, 32px);
      }
    }
  </style>
</head>
<body>

  <section class="bba-hero">
    <!-- Background Video -->
    <video 
      class="bba-hero__video" 
      autoplay 
      muted 
      loop 
      playsinline
    >
      <source src="./Materia Prima/BBA Hero.mp4" type="video/mp4">
    </video>

    <!-- Transparent Overlay -->
    <div class="bba-hero__overlay"></div>

    <!-- Content (Moved Left and Pushed Further Down) -->
    <div class="bba-hero__content slide-up-fade">
      <h1 class="bba-hero__headline">
        Clareza estratégica para transformar crescimento em resultado
      </h1>

      <div class="bba-hero__cta-group">
        <a href="#" class="bba-hero__button">
          Fale com a BBA
          <svg viewBox="0 0 24 24">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </a>
        <span class="bba-hero__microcopy">Diagnóstico inicial sem compromisso.</span>
      </div>
    </div>
  </section>

</body>
</html>
